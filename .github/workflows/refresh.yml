name: Monthly Class Refresh

on:
  # Runs on the 1st of every month at 8:00 AM UTC
  schedule:
    - cron: '0 8 1 * *'

  # Also lets you trigger it manually from the GitHub Actions tab
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # Needed to commit classes.json back to the repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml

      - name: Run refresh
        run: python scraper/scrape_classes.py --refresh

      - name: Check if classes.json changed
        id: diff
        run: |
          git diff --quiet data/classes.json && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push if changed
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/classes.json data/raw_index.json
          git commit -m "chore: add new classes from monthly refresh [$(date +'%Y-%m-%d')]"
          git push

      - name: No changes found
        if: steps.diff.outputs.changed == 'false'
        run: echo "No new classes found. classes.json is already up to date."
